name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: graphrag-eval
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install dependencies, including test dependencies, using Poetry
        shell: bash -l {0}
        run: |
          conda activate graphrag-eval
          poetry install --no-interaction --with test

      - name: Run tests that do not use LLMs
        shell: bash -l {0}
        run: |
          conda activate graphrag-eval
          poetry run pytest --cov=graphrag_eval --cov-report=term-missing tests/

      - name: Install dependencies, including LLM and Ragas dependencies, using Poetry
        shell: bash -l {0}
        run: |
          conda activate graphrag-eval
          poetry install --no-interaction --with llm

      - name: Run tests that use LLMs
        shell: bash -l {0}
        run: |
          conda activate graphrag-eval
          poetry run pytest --cov=graphrag_eval --cov-report=term-missing tests-with-llm/

      - name: Run system tests that use LLMs
        shell: bash -l {0}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_GENERATION_KEY: ${{ secrets.AZURE_OPENAI_GENERATION_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_EMBEDDING_KEY: ${{ secrets.AZURE_OPENAI_EMBEDDING_KEY }}
        run: |
          conda activate graphrag-eval
          poetry run pytest -vv -s system-tests/*.py
